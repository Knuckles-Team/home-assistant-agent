---
services:
  home-assistant-agent-mcp:
    build:
      context: .. # Production
      dockerfile: docker/debug.Dockerfile # Using debug for local dev usually
    container_name: home-assistant-agent-mcp
    hostname: home-assistant-agent-mcp
    command: [ "home-assistant-agent-mcp" ]
    extra_hosts:
      - "host.docker.internal:host-gateway"
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
    restart: always
    volumes:
      - ../mcp:/app
    env_file:
      - ../.env
    environment:
      - "PYTHONUNBUFFERED=1"
      - "HOST=0.0.0.0"
      - "PORT=8004"
      - "TRANSPORT=streamable-http"
    ports:
      - "8004:8004"
    healthcheck:
      test: [ "CMD", "python3", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8004/health')" ]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

  home-assistant-agent-agent:
    build:
      context: .. # Production
      dockerfile: docker/debug.Dockerfile
    container_name: home-assistant-agent-agent
    hostname: home-assistant-agent-agent
    command: [ "home-assistant-agent-agent" ]
    extra_hosts:
      - "host.docker.internal:host-gateway"
    depends_on:
      - home-assistant-agent-mcp
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
    restart: always
    env_file:
      - ../.env
    environment:
      - "PYTHONUNBUFFERED=1"
      - "HOST=0.0.0.0"
      - "PORT=9004"
      - "MCP_URL=http://home-assistant-agent-mcp:8004/mcp"
      - "PROVIDER=openai"
      - "LLM_BASE_URL=${LLM_BASE_URL:-http://host.docker.internal:1234/v1}"
      - "LLM_API_KEY=${LLM_API_KEY:-llama}"
      - "MODEL_ID=${MODEL_ID:-nvidia/nemotron-3-super}"
      - "DEBUG=True"
      - "ENABLE_WEB_UI=True"
      - "ENABLE_OTEL=True"
    ports:
      - "9004:9004"
    healthcheck:
      test: [ "CMD", "python3", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:9004/health')" ]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
